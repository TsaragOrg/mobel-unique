name: Quality

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check specs for pull request
        if: github.event_name == 'pull_request'
        run: node scripts/spec-guard.mjs ${{ github.event.pull_request.base.sha }}

      - name: Check specs for push
        if: github.event_name != 'pull_request'
        run: pnpm spec:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  supabase-dev:
    name: Supabase DEV Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs:
      - quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_DEV_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate DEV deploy configuration
        run: |
          test "${GITHUB_REF_NAME}" = "dev"
          test -n "${SUPABASE_ACCESS_TOKEN}"
          test -n "${SUPABASE_DB_PASSWORD}"
          test -n "${SUPABASE_PROJECT_REF}"

      - name: Link Supabase DEV project
        run: pnpm exec supabase link --project-ref "${SUPABASE_PROJECT_REF}" --password "${SUPABASE_DB_PASSWORD}" --yes

      - name: Push Supabase migrations to DEV
        run: pnpm exec supabase db push --password "${SUPABASE_DB_PASSWORD}" --yes
